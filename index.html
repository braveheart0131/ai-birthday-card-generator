<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Birthday Card Generator</title>

<style>

body{
font-family:Segoe UI, sans-serif;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1,#84fab0,#8fd3f4);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
padding:20px;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:100%;
max-width:500px;
background:white;
border-radius:18px;
padding:26px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
}

h1{margin-top:0}

.emojiRow{font-size:28px;margin-bottom:6px}

label{
display:block;
text-align:left;
margin-top:12px;
font-weight:600;
}

input,select{
width:100%;
padding:11px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
margin-top:16px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff4d6d,#ff8fab);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.cardOutput{
margin-top:22px;
padding:20px;
border-radius:16px;
background:linear-gradient(135deg,#fff3b0,#ffd6e0);
border:2px dashed #ff4d6d;
min-height:110px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
text-align:center;
}

.shareButtons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.copyBtn{background:#4CAF50}
.whatsappBtn{background:#25D366}
.smsBtn{background:#2b6ef2}
.emailBtn{background:#6f42c1}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(720deg)}
}

</style>
</head>

<body>

<div class="container">

<div class="emojiRow">🎉🎈🎂🎁</div>
<h1>AI Birthday Card Generator</h1>

<label>Name</label>
<input id="name" placeholder="Enter name">

<label>Age</label>
<input id="age" type="number" placeholder="Enter age">

<label>Hobby (optional)</label>
<input id="hobby" placeholder="gaming, cooking, travel">

<label>Humor Style</label>
<select id="style">
<option value="funny">Funny</option>
<option value="wholesome">Wholesome</option>
<option value="roast">Playful Roast</option>
</select>

<button onclick="generateMessage()">Generate Message 🎉</button>

<div class="cardOutput" id="result">
Your birthday message will appear here 🎂
</div>

<div class="shareButtons">

<button class="copyBtn" onclick="copyMessage()">Copy</button>

<button class="whatsappBtn" onclick="shareWhatsApp()">
WhatsApp
</button>

<button class="smsBtn" onclick="shareSMS()">
SMS
</button>

<button class="emailBtn" onclick="shareEmail()">
Email
</button>

</div>

</div>

<script>

async function generateMessage(){

const name=document.getElementById("name").value
const age=document.getElementById("age").value
const hobby=document.getElementById("hobby").value
const style=document.getElementById("style").value

if(!name || !age){
document.getElementById("result").innerText=
"Please enter a name and age 🎂"
return
}

const response = await fetch("https://bday-card-generator.vercel.app/api/generate", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    name,
    age,
    hobby,
    style
  })
});

const data = await response.json()

document.getElementById("result").innerText=data.message

launchConfetti()

}

function copyMessage(){

const text=document.getElementById("result").innerText
navigator.clipboard.writeText(text)

}

function shareWhatsApp(){

const text=encodeURIComponent(
document.getElementById("result").innerText)

window.open(
`https://wa.me/?text=${text}`,
"_blank"
)

}

function shareSMS(){

const text=encodeURIComponent(
document.getElementById("result").innerText)

window.location.href=`sms:?&body=${text}`

}

function shareEmail(){

const text=encodeURIComponent(
document.getElementById("result").innerText)

window.location.href=
`mailto:?subject=Birthday Message&body=${text}`

}

function launchConfetti(){

for(let i=0;i<60;i++){

const conf=document.createElement("div")

conf.className="confetti"

conf.style.left=Math.random()*100+"vw"

conf.style.backgroundColor=
`hsl(${Math.random()*360},70%,60%)`

conf.style.animationDuration=
(Math.random()*2+2)+"s"

document.body.appendChild(conf)

setTimeout(()=>conf.remove(),3000)

}

}

</script>

</body>
</>
